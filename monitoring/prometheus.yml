global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: cinema_api
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics

  # JMeter metrics — wymaga pluginu johrstrom (patrz komentarz w perf_test.jmx)
  # JMeter dziala na hoscie, Prometheus w Dockerze → host.docker.internal
  - job_name: jmeter
    static_configs:
      - targets: ['host.docker.internal:9270']
    metrics_path: /metrics
